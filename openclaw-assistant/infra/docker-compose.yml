version: "3.9"
services:
  gateway:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    environment:
      OPENCLAW_X_PORT: "18789"
      OPENCLAW_X_POSTGRES_URL: "postgres://openclaw:openclaw@postgres:5432/openclaw"
      OPENCLAW_X_REDIS_URL: "redis://redis:6379"
      OPENCLAW_X_QDRANT_URL: "http://qdrant:6333"
      OPENCLAW_X_QDRANT_COLLECTION: "openclaw_memory"
    ports:
      - "18789:18789"
    depends_on:
      - postgres
      - redis
      - qdrant
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: openclaw
      POSTGRES_USER: openclaw
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
